[bridge]
autostart = true
reconnect_delay_ms = 2000

[qualisys]
host = "127.0.0.1"
port = 22223
timeout_ms = 5000

[stream]
include = ["rigid-bodies"]
transport = "udp"
udp_bind = "0.0.0.0:0"
velocity_max_gap_ms = 100
velocity_min_dt_ms = 1
position_stddev_m = 0.002
attitude_stddev_rad = 0.01

[zenoh]
mode = "router"
connect = ""
listen = "udp/0.0.0.0:7447,tcp/0.0.0.0:7447"
topic = "qualisys/mocap"
external_odometry_topic_prefix = ""
rigid_body_names_topic = "qualisys/rigid_body_names"
no_external_odometry = false
admin_query_timeout_ms = 1000

[web]
enabled = true
bind = "127.0.0.1:8787"
open_browser = true

[logging]

[updates]
enabled = true
auto_check = true
auto_install = true
check_interval_minutes = 360
github_owner = "CogniPilot"
github_repo = "synapse_qualisys_bridge"
